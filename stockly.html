<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Stockly">
  <title>Stockly Beta</title>
  <style>
    :root {
      --primary: #185FA5;
      --primary-dark: #0C447C;
      --success: #27500A;
      --success-bg: #EAF3DE;
      --warning: #633806;
      --warning-bg: #FAEEDA;
      --danger: #791F1F;
      --danger-bg: #FCEBEB;
      --text: #1a1a1a;
      --text-2: #555;
      --text-3: #888;
      --border: #e0e0e0;
      --border-2: #ccc;
      --bg: #f5f5f5;
      --bg-card: #ffffff;
      --radius: 10px;
      --radius-sm: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    input, select, button { font-family: inherit; outline: none; }
    input, select { border: 1px solid var(--border-2); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 15px; width: 100%; background: #fff; color: var(--text); }
    input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(24,95,165,0.1); }

    /* TOPBAR */
    .topbar { background: var(--primary); color: #fff; padding: 14px 16px 10px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .topbar-title { font-size: 17px; font-weight: 600; }
    .topbar-sub { font-size: 11px; opacity: 0.75; margin-top: 1px; }

    /* BOTTOM NAV */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--border); display: flex; z-index: 50; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 4px 10px; cursor: pointer; color: var(--text-3); font-size: 10px; gap: 3px; border: none; background: none; transition: color .15s; }
    .nav-item.active { color: var(--primary); }
    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-label { font-weight: 500; }

    /* PAGES */
    .page { display: none; padding: 12px 12px 80px; }
    .page.active { display: block; }

    /* CARDS */
    .card { background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; }
    .card-header { padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .card-body { padding: 12px 14px; }

    /* METRICS */
    .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .metric-box { background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border); padding: 12px; }
    .metric-val { font-size: 22px; font-weight: 600; color: var(--text); }
    .metric-val.green { color: #2a7a12; }
    .metric-val.blue { color: var(--primary); }
    .metric-val.orange { color: #b85c00; }
    .metric-val.red { color: #c0392b; }
    .metric-lbl { font-size: 11px; color: var(--text-3); margin-top: 3px; }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 11px 18px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
    .btn-primary { background: var(--primary); color: #fff; width: 100%; }
    .btn-primary:active { background: var(--primary-dark); }
    .btn-secondary { background: #fff; color: var(--text-2); border: 1px solid var(--border-2); width: 100%; }
    .btn-danger-sm { background: none; border: 1px solid #f5a5a5; border-radius: var(--radius-sm); color: #c0392b; font-size: 12px; padding: 4px 10px; cursor: pointer; }
    .btn-sm { font-size: 13px; padding: 7px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-2); background: #fff; color: var(--text-2); cursor: pointer; }

    /* BADGES */
    .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
    .badge-ok { background: var(--success-bg); color: var(--success); }
    .badge-low { background: var(--warning-bg); color: var(--warning); }
    .badge-out { background: var(--danger-bg); color: var(--danger); }

    /* PRODUCT LIST */
    .product-item { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid var(--border); }
    .product-item:last-child { border-bottom: none; }
    .product-icon { width: 38px; height: 38px; border-radius: var(--radius-sm); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .product-info { flex: 1; min-width: 0; }
    .product-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-meta { font-size: 12px; color: var(--text-3); margin-top: 2px; }
    .product-right { text-align: right; flex-shrink: 0; }
    .product-price { font-size: 14px; font-weight: 600; color: var(--text); }
    .product-stock { font-size: 12px; color: var(--text-3); margin-top: 2px; }

    /* SEARCH */
    .search-bar { position: relative; margin-bottom: 10px; }
    .search-bar input { padding-left: 36px; }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text-3); pointer-events: none; }
    .dropdown { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid var(--border-2); border-radius: var(--radius-sm); margin-top: 3px; z-index: 100; max-height: 240px; overflow-y: auto; display: none; box-shadow: 0 4px 16px rgba(0,0,0,0.10); }
    .dropdown.open { display: block; }
    .drop-item { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
    .drop-item:last-child { border-bottom: none; }
    .drop-item:active { background: var(--bg); }
    .drop-item.disabled { opacity: 0.4; pointer-events: none; }
    .drop-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .drop-name em { font-style: normal; color: var(--primary); }
    .drop-sub { font-size: 12px; color: var(--text-3); margin-top: 2px; }
    .drop-right { text-align: right; }
    .drop-price { font-size: 14px; font-weight: 600; color: var(--text); }
    .drop-stock-ok { font-size: 12px; color: #2a7a12; }
    .drop-stock-low { font-size: 12px; color: #b85c00; }
    .drop-stock-out { font-size: 12px; color: #c0392b; }

    /* CART */
    .cart-empty { text-align: center; padding: 32px 16px; color: var(--text-3); }
    .cart-empty-icon { font-size: 40px; margin-bottom: 8px; }
    .cart-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cart-item-price { font-size: 12px; color: var(--text-3); margin-top: 2px; }
    .qty-ctrl { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .qty-btn { width: 30px; height: 30px; border-radius: var(--radius-sm); border: 1px solid var(--border-2); background: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); }
    .qty-btn:active { background: var(--bg); }
    .qty-val { font-size: 15px; font-weight: 600; min-width: 24px; text-align: center; }
    .cart-item-total { font-size: 14px; font-weight: 600; min-width: 72px; text-align: right; flex-shrink: 0; }
    .remove-item { background: none; border: none; font-size: 20px; color: var(--text-3); cursor: pointer; padding: 0 0 0 4px; flex-shrink: 0; }

    /* SUMMARY BOX */
    .summary-box { background: var(--bg); border-radius: var(--radius-sm); padding: 12px; margin: 10px 14px; }
    .sum-row { display: flex; justify-content: space-between; font-size: 14px; color: var(--text-2); padding: 3px 0; }
    .sum-row.total { font-weight: 700; color: var(--text); font-size: 17px; border-top: 1px solid var(--border); margin-top: 5px; padding-top: 7px; }
    .sum-row.profit { color: #2a7a12; font-weight: 600; }

    /* TICKET */
    .ticket { background: #fff; border: 1px dashed var(--border-2); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
    .ticket-header { text-align: center; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed var(--border); }
    .ticket-id { font-size: 16px; font-weight: 700; color: var(--text); }
    .ticket-date { font-size: 12px; color: var(--text-3); margin-top: 3px; }
    .ticket-item { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; border-bottom: 1px solid var(--border); }
    .ticket-item:last-child { border-bottom: none; }
    .ticket-item-name { color: var(--text); font-weight: 500; }
    .ticket-item-detail { font-size: 12px; color: var(--text-3); }
    .ticket-item-val { font-weight: 600; color: var(--text); }
    .ticket-totals { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }

    /* HISTORY */
    .sale-card { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); padding: 12px 14px; margin-bottom: 8px; }
    .sale-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .sale-id { font-size: 13px; font-weight: 600; color: var(--text); }
    .sale-date { font-size: 11px; color: var(--text-3); }
    .sale-total { font-size: 16px; font-weight: 700; color: var(--text); }
    .sale-profit { font-size: 12px; color: #2a7a12; font-weight: 600; }
    .pill { display: inline-block; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 2px 9px; font-size: 11px; color: var(--text-2); margin: 2px 2px 0 0; }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: var(--radius) var(--radius) 0 0; width: 100%; max-height: 92vh; overflow-y: auto; padding: 16px 16px 32px; }
    .modal-handle { width: 36px; height: 4px; background: var(--border-2); border-radius: 2px; margin: 0 auto 14px; }
    .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: var(--text-2); margin-bottom: 5px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }

    /* PERIOD TABS */
    .period-tabs { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px; }
    .period-btn { font-size: 13px; padding: 6px 14px; border: 1px solid var(--border-2); border-radius: 20px; background: #fff; color: var(--text-2); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .period-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* ESTADO RESULTADOS */
    .result-section { margin-bottom: 14px; }
    .result-section-title { font-size: 12px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .result-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 14px; background: #fff; border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 5px; }
    .result-row.total { background: var(--primary); border-color: var(--primary); }
    .result-row.total .result-label, .result-row.total .result-value { color: #fff; font-weight: 700; font-size: 16px; }
    .result-row.subtotal { background: var(--bg); }
    .result-label { font-size: 14px; color: var(--text); }
    .result-value { font-size: 14px; font-weight: 600; color: var(--text); }
    .result-value.positive { color: #2a7a12; }
    .result-value.negative { color: #c0392b; }
    .chart-bar-wrap { margin: 4px 0 2px; }
    .chart-bar-bg { background: var(--border); border-radius: 3px; height: 7px; overflow: hidden; }
    .chart-bar-fill { height: 100%; border-radius: 3px; background: var(--primary); transition: width .4s; }
    .chart-bar-fill.green { background: #2a7a12; }
    .chart-bar-fill.orange { background: #b85c00; }

    /* TOAST */
    .toast { position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; font-size: 14px; padding: 10px 20px; border-radius: 20px; z-index: 300; display: none; white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
    .toast.show { display: block; }

    /* ALERT BAR */
    .alert-bar { background: var(--warning-bg); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; color: var(--warning); margin-bottom: 10px; display: none; }

    /* FILTER ROW */
    .filter-row { display: flex; gap: 8px; margin-bottom: 10px; overflow-x: auto; }
    .filter-row select { flex-shrink: 0; font-size: 13px; padding: 7px 10px; }

    /* FAB */
    .fab { position: fixed; bottom: 76px; right: 16px; width: 52px; height: 52px; background: var(--primary); border-radius: 50%; border: none; color: #fff; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px rgba(24,95,165,0.4); z-index: 40; }

    /* EMPTY */
    .empty-state { text-align: center; padding: 40px 16px; color: var(--text-3); }
    .empty-icon { font-size: 44px; margin-bottom: 10px; }
    .empty-text { font-size: 14px; }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div>
    <div class="topbar-title">📦 Stockly</div>
    <div class="topbar-sub" id="topbar-sub">Beta · cargando...</div>
  </div>
  <div style="font-size:12px;opacity:.8;" id="topbar-date"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- PAGE: INVENTARIO -->
<div class="page active" id="page-inv">
  <div class="metric-grid" id="inv-metrics"></div>
  <div class="alert-bar" id="inv-alert"></div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="inv-search" placeholder="Buscar producto..." oninput="renderInv()">
  </div>
  <div class="filter-row">
    <select id="inv-cat" onchange="renderInv()"><option value="">Todas las categorías</option></select>
    <select id="inv-stock" onchange="renderInv()">
      <option value="">Todo el stock</option>
      <option value="ok">Normal</option>
      <option value="low">Stock bajo</option>
      <option value="out">Sin stock</option>
    </select>
  </div>
  <div class="card" id="inv-list"></div>
</div>

<!-- PAGE: POS -->
<div class="page" id="page-pos">
  <div class="card" style="margin-bottom:10px;">
    <div class="card-header"><span class="card-title">🛒 Nueva venta</span><span id="cart-count" style="font-size:12px;color:var(--text-3);"></span></div>
    <div class="card-body" style="padding:10px 14px;">
      <div class="search-bar" style="margin-bottom:0;position:relative;">
        <span class="search-icon">🔍</span>
        <input type="text" id="pos-search" placeholder="Buscar y agregar producto..." autocomplete="off" oninput="onPosSearch()" onfocus="onPosSearch()">
        <div class="dropdown" id="pos-dropdown"></div>
      </div>
    </div>
    <div id="cart-body">
      <div class="cart-empty" id="cart-empty">
        <div class="cart-empty-icon">🛍️</div>
        <div>El carro está vacío</div>
      </div>
      <div id="cart-items" style="display:none;"></div>
    </div>
    <div id="cart-summary" style="display:none;">
      <div class="summary-box">
        <div class="sum-row"><span>Subtotal</span><span id="pos-sub">$0</span></div>
        <div class="sum-row"><span>Costo total</span><span id="pos-cost">$0</span></div>
        <div class="sum-row total"><span>Total</span><span id="pos-total">$0</span></div>
        <div class="sum-row profit"><span>Ganancia</span><span id="pos-profit">$0</span></div>
      </div>
      <div style="padding:0 14px 14px;display:flex;flex-direction:column;gap:8px;">
        <button class="btn btn-primary" onclick="confirmSale()">✓ Confirmar venta</button>
        <button class="btn btn-secondary" onclick="clearCart()">Vaciar carro</button>
      </div>
    </div>
  </div>

  <!-- ÚLTIMO TICKET -->
  <div id="last-ticket-wrap" style="display:none;">
    <div style="font-size:13px;font-weight:600;color:var(--text-3);margin-bottom:8px;">🧾 ÚLTIMO TICKET</div>
    <div class="ticket" id="last-ticket"></div>
  </div>

  <!-- HISTORIAL -->
  <div style="font-size:13px;font-weight:600;color:var(--text-3);margin-bottom:8px;">HISTORIAL DE VENTAS</div>
  <div class="period-tabs">
    <button class="period-btn active" onclick="setPeriod('hoy',this)">Hoy</button>
    <button class="period-btn" onclick="setPeriod('semana',this)">Semana</button>
    <button class="period-btn" onclick="setPeriod('mes',this)">Mes</button>
    <button class="period-btn" onclick="setPeriod('todo',this)">Todo</button>
  </div>
  <div class="metric-grid" id="pos-metrics"></div>
  <div id="hist-list"></div>
</div>

<!-- PAGE: ESTADO DE RESULTADOS -->
<div class="page" id="page-er">
  <div class="period-tabs">
    <button class="period-btn active" onclick="setErPeriod('hoy',this)">Hoy</button>
    <button class="period-btn" onclick="setErPeriod('semana',this)">Semana</button>
    <button class="period-btn" onclick="setErPeriod('mes',this)">Mes</button>
    <button class="period-btn" onclick="setErPeriod('todo',this)">Todo</button>
  </div>
  <div id="er-content"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-item active" onclick="showPage('inv',this)">
    <span class="nav-icon">📦</span>
    <span class="nav-label">Inventario</span>
  </button>
  <button class="nav-item" onclick="showPage('pos',this)">
    <span class="nav-icon">🛒</span>
    <span class="nav-label">Ventas</span>
  </button>
  <button class="nav-item" onclick="showPage('er',this)">
    <span class="nav-icon">📊</span>
    <span class="nav-label">Resultados</span>
  </button>
</div>

<!-- FAB: Agregar producto -->
<button class="fab" id="fab" onclick="openAddProduct()" title="Agregar producto">＋</button>

<!-- MODAL: Agregar/Editar Producto -->
<div class="modal-overlay" id="modal-prod">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-prod-title">Agregar producto</div>
    <div class="field"><label>Nombre del producto</label><input type="text" id="f-nombre" placeholder="Ej: Crema de manos Avon"></div>
    <div class="field"><label>Categoría</label><input type="text" id="f-cat" placeholder="Ej: Cosméticos, Panadería..."></div>
    <div class="field-row">
      <div class="field"><label>Precio venta ($)</label><input type="number" id="f-precio" placeholder="0" min="0" inputmode="numeric"></div>
      <div class="field"><label>Costo ($)</label><input type="number" id="f-costo" placeholder="0" min="0" inputmode="numeric"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Stock actual</label><input type="number" id="f-stock" placeholder="0" min="0" inputmode="numeric"></div>
      <div class="field"><label>Alerta bajo stock</label><input type="number" id="f-alerta" placeholder="5" min="0" inputmode="numeric"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveProduct()">Guardar producto</button>
      <button class="btn btn-secondary" onclick="closeModal('modal-prod')">Cancelar</button>
    </div>
  </div>
</div>

<script>
  // ── STORAGE ──
  var PK = 'stockly-products';
  var SK = 'stockly-sales';
  var products = [];
  var sales = [];
  var cart = [];
  var editId = null;
  var period = 'hoy';
  var erPeriod = 'hoy';
  var toastTimer = null;

  function loadData() {
    try { products = JSON.parse(localStorage.getItem(PK)) || []; } catch(e) { products = []; }
    try { sales = JSON.parse(localStorage.getItem(SK)) || []; } catch(e) { sales = []; }
  }

  function saveProducts() { localStorage.setItem(PK, JSON.stringify(products)); }
  function saveSales() { localStorage.setItem(SK, JSON.stringify(sales)); }

  // ── UTILS ──
  function fmt(n) { return '$' + Math.round(n).toLocaleString('es-CL'); }
  function fmtDate(iso) {
    var d = new Date(iso);
    return d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear() + ' ' +
      d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }
  function status(p) { return p.stock === 0 ? 'out' : p.stock <= p.alerta ? 'low' : 'ok'; }
  function badge(s) {
    if (s==='ok') return '<span class="badge badge-ok">Normal</span>';
    if (s==='low') return '<span class="badge badge-low">Stock bajo</span>';
    return '<span class="badge badge-out">Sin stock</span>';
  }
  function catEmoji(cat) {
    cat = (cat||'').toLowerCase();
    if (cat.includes('pan') || cat.includes('harin') || cat.includes('levad')) return '🍞';
    if (cat.includes('cosm') || cat.includes('crema') || cat.includes('avon') || cat.includes('natur')) return '💄';
    if (cat.includes('bebi') || cat.includes('botill')) return '🍺';
    if (cat.includes('mini') || cat.includes('abarr') || cat.includes('compl')) return '🏪';
    return '📦';
  }
  function hl(text, q) {
    if (!q) return text;
    return text.replace(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi'), '<em>$1</em>');
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2500);
  }

  // ── NAVIGATION ──
  function showPage(name, btn) {
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    document.querySelectorAll('.nav-item').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('page-' + name).classList.add('active');
    btn.classList.add('active');
    document.getElementById('fab').style.display = name === 'inv' ? 'flex' : 'none';
    if (name === 'pos') renderPos();
    if (name === 'er') renderEr();
    if (name === 'inv') renderInv();
  }

  // ── TOPBAR ──
  function updateTopbar() {
    var now = new Date();
    document.getElementById('topbar-date').textContent =
      now.getDate() + '/' + (now.getMonth()+1) + '/' + now.getFullYear();
    document.getElementById('topbar-sub').textContent =
      'Beta · ' + products.length + ' productos';
  }

  // ─────────────────────────────────────────
  // INVENTARIO
  // ─────────────────────────────────────────
  function renderInv() {
    updateTopbar();
    var q = document.getElementById('inv-search').value.toLowerCase();
    var cat = document.getElementById('inv-cat').value;
    var sf = document.getElementById('inv-stock').value;

    var cats = [];
    products.forEach(function(p) { if (p.cat && cats.indexOf(p.cat) < 0) cats.push(p.cat); });
    var catSel = document.getElementById('inv-cat');
    var curCat = catSel.value;
    catSel.innerHTML = '<option value="">Todas las categorías</option>';
    cats.sort().forEach(function(c) {
      var o = document.createElement('option');
      o.value = c; o.textContent = c;
      if (c === curCat) o.selected = true;
      catSel.appendChild(o);
    });

    var list = products.filter(function(p) {
      if (q && p.nombre.toLowerCase().indexOf(q) < 0) return false;
      if (cat && p.cat !== cat) return false;
      if (sf && status(p) !== sf) return false;
      return true;
    });

    var total = products.length;
    var bajos = products.filter(function(p) { return status(p) === 'low'; }).length;
    var sinStock = products.filter(function(p) { return status(p) === 'out'; }).length;
    var valor = products.reduce(function(a,p) { return a + p.costo * p.stock; }, 0);

    document.getElementById('inv-metrics').innerHTML =
      '<div class="metric-box"><div class="metric-val">' + total + '</div><div class="metric-lbl">Productos</div></div>' +
      '<div class="metric-box"><div class="metric-val blue">' + fmt(valor) + '</div><div class="metric-lbl">Valor inventario</div></div>' +
      '<div class="metric-box"><div class="metric-val orange">' + bajos + '</div><div class="metric-lbl">Stock bajo</div></div>' +
      '<div class="metric-box"><div class="metric-val red">' + sinStock + '</div><div class="metric-lbl">Sin stock</div></div>';

    var alertas = products.filter(function(p) { return status(p) !== 'ok'; });
    var ab = document.getElementById('inv-alert');
    if (alertas.length) {
      ab.style.display = 'block';
      ab.textContent = '⚠️ ' + alertas.length + ' producto(s) requieren atención: ' + alertas.map(function(p){ return p.nombre; }).join(', ');
    } else { ab.style.display = 'none'; }

    var invList = document.getElementById('inv-list');
    if (!products.length) {
      invList.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">No hay productos aún.<br>Toca el botón + para agregar.</div></div>';
      return;
    }
    if (!list.length) {
      invList.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">Sin resultados.</div></div>';
      return;
    }
    invList.innerHTML = list.map(function(p) {
      var s = status(p);
      var mgn = p.precio > 0 ? Math.round((p.precio - p.costo) / p.precio * 100) : 0;
      return '<div class="product-item">' +
        '<div class="product-icon">' + catEmoji(p.cat) + '</div>' +
        '<div class="product-info">' +
          '<div class="product-name">' + p.nombre + '</div>' +
          '<div class="product-meta">' + (p.cat||'—') + ' · Margen: ' + mgn + '%</div>' +
          '<div style="margin-top:4px;">' + badge(s) + '</div>' +
        '</div>' +
        '<div class="product-right">' +
          '<div class="product-price">' + fmt(p.precio) + '</div>' +
          '<div class="product-stock">Stock: ' + p.stock + '</div>' +
          '<div style="margin-top:6px;display:flex;gap:6px;">' +
            '<button class="btn-sm" onclick="openEditProduct(' + p.id + ')">✏️</button>' +
            '<button class="btn-danger-sm" onclick="delProduct(' + p.id + ')">🗑</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function openAddProduct() {
    editId = null;
    document.getElementById('modal-prod-title').textContent = 'Agregar producto';
    ['f-nombre','f-cat','f-precio','f-costo','f-stock','f-alerta'].forEach(function(id) {
      document.getElementById(id).value = '';
    });
    document.getElementById('modal-prod').classList.add('open');
  }

  function openEditProduct(id) {
    editId = id;
    var p = products.find(function(x) { return x.id === id; });
    document.getElementById('modal-prod-title').textContent = 'Editar producto';
    document.getElementById('f-nombre').value = p.nombre;
    document.getElementById('f-cat').value = p.cat || '';
    document.getElementById('f-precio').value = p.precio;
    document.getElementById('f-costo').value = p.costo;
    document.getElementById('f-stock').value = p.stock;
    document.getElementById('f-alerta').value = p.alerta;
    document.getElementById('modal-prod').classList.add('open');
  }

  function saveProduct() {
    var nombre = document.getElementById('f-nombre').value.trim();
    if (!nombre) { showToast('Ingresa el nombre del producto'); return; }
    var data = {
      nombre: nombre,
      cat: document.getElementById('f-cat').value.trim(),
      precio: parseFloat(document.getElementById('f-precio').value) || 0,
      costo: parseFloat(document.getElementById('f-costo').value) || 0,
      stock: parseInt(document.getElementById('f-stock').value) || 0,
      alerta: parseInt(document.getElementById('f-alerta').value) || 5,
    };
    if (editId) {
      var idx = products.findIndex(function(p) { return p.id === editId; });
      products[idx] = Object.assign({ id: editId }, data);
    } else {
      data.id = Date.now();
      products.push(data);
    }
    saveProducts();
    closeModal('modal-prod');
    renderInv();
    showToast(editId ? 'Producto actualizado ✓' : 'Producto agregado ✓');
  }

  function delProduct(id) {
    if (!confirm('¿Eliminar este producto?')) return;
    products = products.filter(function(p) { return p.id !== id; });
    saveProducts();
    renderInv();
    showToast('Producto eliminado');
  }

  // ─────────────────────────────────────────
  // POS - PUNTO DE VENTA
  // ─────────────────────────────────────────
  function cartQty(pid) {
    var c = cart.find(function(x) { return x.pid === pid; });
    return c ? c.qty : 0;
  }

  function onPosSearch() {
    var q = document.getElementById('pos-search').value.trim().toLowerCase();
    var dd = document.getElementById('pos-dropdown');
    if (!q) { dd.classList.remove('open'); return; }
    var matches = products.filter(function(p) { return p.nombre.toLowerCase().indexOf(q) >= 0; });
    if (!matches.length) {
      dd.innerHTML = '<div style="padding:12px 14px;font-size:14px;color:var(--text-3);">Sin resultados para "' + q + '"</div>';
      dd.classList.add('open'); return;
    }
    dd.innerHTML = matches.map(function(p) {
      var avail = p.stock - cartQty(p.id);
      var out = avail <= 0;
      var sc = out ? 'drop-stock-out' : p.stock <= p.alerta ? 'drop-stock-low' : 'drop-stock-ok';
      var sl = out ? 'Sin stock' : 'Disponible: ' + avail + ' un.';
      return '<div class="drop-item ' + (out?'disabled':'') + '" onclick="' + (out?'':'addToCart('+p.id+')')+'">' +
        '<div>' +
          '<div class="drop-name">' + catEmoji(p.cat) + ' ' + hl(p.nombre, q) + '</div>' +
          '<div class="drop-sub">' + (p.cat||'—') + '</div>' +
        '</div>' +
        '<div class="drop-right">' +
          '<div class="drop-price">' + fmt(p.precio) + '</div>' +
          '<div class="' + sc + '">' + sl + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
    dd.classList.add('open');
  }

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.search-bar')) {
      var dd = document.getElementById('pos-dropdown');
      if (dd) dd.classList.remove('open');
    }
  });

  function addToCart(pid) {
    var p = products.find(function(x) { return x.id === pid; });
    var avail = p.stock - cartQty(pid);
    if (avail <= 0) { showToast('Sin stock disponible'); return; }
    var idx = cart.findIndex(function(x) { return x.pid === pid; });
    if (idx >= 0) { cart[idx].qty++; }
    else { cart.push({ pid: pid, nombre: p.nombre, cat: p.cat, precio: p.precio, costo: p.costo, qty: 1 }); }
    document.getElementById('pos-search').value = '';
    document.getElementById('pos-dropdown').classList.remove('open');
    renderCart();
  }

  function changeQty(pid, delta) {
    var idx = cart.findIndex(function(x) { return x.pid === pid; });
    if (idx < 0) return;
    var p = products.find(function(x) { return x.id === pid; });
    var nq = cart[idx].qty + delta;
    if (nq <= 0) { cart.splice(idx, 1); }
    else if (nq > p.stock) { showToast('Máx. disponible: ' + p.stock + ' un.'); return; }
    else { cart[idx].qty = nq; }
    renderCart();
  }

  function removeFromCart(pid) { cart = cart.filter(function(x) { return x.pid !== pid; }); renderCart(); }
  function clearCart() { if (!cart.length || confirm('¿Vaciar el carro?')) { cart = []; renderCart(); } }

  function renderCart() {
    var ce = document.getElementById('cart-empty');
    var ci = document.getElementById('cart-items');
    var cs = document.getElementById('cart-summary');
    var cc = document.getElementById('cart-count');
    if (!cart.length) {
      ce.style.display = 'block'; ci.style.display = 'none'; cs.style.display = 'none';
      cc.textContent = ''; return;
    }
    ce.style.display = 'none'; ci.style.display = 'block'; cs.style.display = 'block';
    cc.textContent = cart.reduce(function(a,c){ return a+c.qty; },0) + ' items';
    ci.innerHTML = cart.map(function(c) {
      return '<div class="cart-item">' +
        '<div class="cart-item-info">' +
          '<div class="cart-item-name">' + c.nombre + '</div>' +
          '<div class="cart-item-price">' + fmt(c.precio) + ' c/u</div>' +
        '</div>' +
        '<div class="qty-ctrl">' +
          '<button class="qty-btn" onclick="changeQty(' + c.pid + ',-1)">−</button>' +
          '<span class="qty-val">' + c.qty + '</span>' +
          '<button class="qty-btn" onclick="changeQty(' + c.pid + ',1)">+</button>' +
        '</div>' +
        '<div class="cart-item-total">' + fmt(c.precio * c.qty) + '</div>' +
        '<button class="remove-item" onclick="removeFromCart(' + c.pid + ')">×</button>' +
      '</div>';
    }).join('');
    var total = cart.reduce(function(a,c){ return a+c.precio*c.qty; },0);
    var costo = cart.reduce(function(a,c){ return a+c.costo*c.qty; },0);
    var gan = total - costo;
    document.getElementById('pos-sub').textContent = fmt(total);
    document.getElementById('pos-cost').textContent = fmt(costo);
    document.getElementById('pos-total').textContent = fmt(total);
    document.getElementById('pos-profit').textContent = fmt(gan) + ' (' + (total>0?Math.round(gan/total*100):0) + '%)';
  }

  function confirmSale() {
    if (!cart.length) return;
    var total = cart.reduce(function(a,c){ return a+c.precio*c.qty; },0);
    var costo = cart.reduce(function(a,c){ return a+c.costo*c.qty; },0);
    var ganancia = total - costo;
    var saleId = 'V-' + Date.now().toString().slice(-5);
    var sale = { id: Date.now(), saleId: saleId, items: cart.slice(), total: total, costo: costo, ganancia: ganancia, ts: new Date().toISOString() };
    sales.unshift(sale);
    cart.forEach(function(c) {
      var idx = products.findIndex(function(p) { return p.id === c.pid; });
      if (idx >= 0) products[idx].stock -= c.qty;
    });
    saveProducts(); saveSales();
    showLastTicket(sale);
    cart = []; renderCart(); renderHistory();
    showToast('¡Venta confirmada! Stock actualizado ✓');
  }

  function showLastTicket(sale) {
    var mg = sale.total > 0 ? Math.round(sale.ganancia/sale.total*100) : 0;
    var wrap = document.getElementById('last-ticket-wrap');
    wrap.style.display = 'block';
    document.getElementById('last-ticket').innerHTML =
      '<div class="ticket-header">' +
        '<div class="ticket-id">' + sale.saleId + '</div>' +
        '<div class="ticket-date">' + fmtDate(sale.ts) + '</div>' +
      '</div>' +
      sale.items.map(function(c) {
        return '<div class="ticket-item">' +
          '<div><div class="ticket-item-name">' + c.nombre + '</div>' +
          '<div class="ticket-item-detail">' + c.qty + ' un. × ' + fmt(c.precio) + '</div></div>' +
          '<div class="ticket-item-val">' + fmt(c.precio*c.qty) + '</div></div>';
      }).join('') +
      '<div class="ticket-totals">' +
        '<div class="sum-row total"><span>Total</span><span>' + fmt(sale.total) + '</span></div>' +
        '<div class="sum-row profit"><span>Ganancia</span><span>' + fmt(sale.ganancia) + ' (' + mg + '%)</span></div>' +
      '</div>';
  }

  function setPeriod(p, btn) {
    period = p;
    document.querySelectorAll('.period-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    renderHistory();
  }

  function filteredSales(per) {
    var now = new Date();
    return sales.filter(function(s) {
      var d = new Date(s.ts);
      if (per==='hoy') return d.toDateString() === now.toDateString();
      if (per==='semana') return (now-d)/86400000 <= 7;
      if (per==='mes') return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
      return true;
    });
  }

  function renderHistory() {
    var list = filteredSales(period);
    var ing = list.reduce(function(a,s){ return a+s.total; },0);
    var gan = list.reduce(function(a,s){ return a+s.ganancia; },0);
    var mg = ing > 0 ? Math.round(gan/ing*100) : 0;
    document.getElementById('pos-metrics').innerHTML =
      '<div class="metric-box"><div class="metric-val">' + list.length + '</div><div class="metric-lbl">Ventas</div></div>' +
      '<div class="metric-box"><div class="metric-val blue">' + fmt(ing) + '</div><div class="metric-lbl">Ingresos</div></div>' +
      '<div class="metric-box"><div class="metric-val green">' + fmt(gan) + '</div><div class="metric-lbl">Ganancia</div></div>' +
      '<div class="metric-box"><div class="metric-val">' + mg + '%</div><div class="metric-lbl">Margen</div></div>';
    var hl = document.getElementById('hist-list');
    if (!list.length) { hl.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Sin ventas en este período.</div></div>'; return; }
    hl.innerHTML = list.map(function(s) {
      var mg2 = s.total > 0 ? Math.round(s.ganancia/s.total*100) : 0;
      return '<div class="sale-card">' +
        '<div class="sale-card-header">' +
          '<div><div class="sale-id">' + s.saleId + '</div><div class="sale-date">' + fmtDate(s.ts) + '</div></div>' +
          '<div style="text-align:right;"><div class="sale-total">' + fmt(s.total) + '</div><div class="sale-profit">+' + fmt(s.ganancia) + ' (' + mg2 + '%)</div></div>' +
        '</div>' +
        '<div>' + s.items.map(function(c){ return '<span class="pill">' + c.qty + ' × ' + c.nombre + '</span>'; }).join('') + '</div>' +
        '<div style="margin-top:8px;"><button class="btn-danger-sm" onclick="deleteSale(' + s.id + ')">Eliminar venta</button></div>' +
      '</div>';
    }).join('');
  }

  function deleteSale(id) {
    if (!confirm('¿Eliminar esta venta?')) return;
    sales = sales.filter(function(s) { return s.id !== id; });
    saveSales(); renderHistory();
    showToast('Venta eliminada');
  }

  function renderPos() { renderCart(); renderHistory(); }

  // ─────────────────────────────────────────
  // ESTADO DE RESULTADOS
  // ─────────────────────────────────────────
  function setErPeriod(p, btn) {
    erPeriod = p;
    document.querySelectorAll('.period-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    renderEr();
  }

  function renderEr() {
    var list = filteredSales(erPeriod);
    var ingresos = list.reduce(function(a,s){ return a+s.total; },0);
    var costos = list.reduce(function(a,s){ return a+s.costo; },0);
    var utilidad = ingresos - costos;
    var margen = ingresos > 0 ? Math.round(utilidad/ingresos*100) : 0;
    var valorInv = products.reduce(function(a,p){ return a+p.costo*p.stock; },0);

    // Top productos
    var grouped = {};
    list.forEach(function(s) {
      s.items.forEach(function(c) {
        if (!grouped[c.nombre]) grouped[c.nombre] = { ingresos:0, costo:0, qty:0 };
        grouped[c.nombre].ingresos += c.precio * c.qty;
        grouped[c.nombre].costo += c.costo * c.qty;
        grouped[c.nombre].qty += c.qty;
      });
    });
    var topProds = Object.keys(grouped).map(function(k) {
      return { nombre:k, ingresos:grouped[k].ingresos, ganancia:grouped[k].ingresos-grouped[k].costo, qty:grouped[k].qty };
    }).sort(function(a,b){ return b.ganancia-a.ganancia; }).slice(0,5);
    var maxGan = topProds.length ? topProds[0].ganancia : 1;

    var er = document.getElementById('er-content');
    er.innerHTML =
      '<div class="result-section">' +
        '<div class="result-section-title">Resumen del período</div>' +
        '<div class="result-row"><span class="result-label">💰 Ingresos por ventas</span><span class="result-value positive">' + fmt(ingresos) + '</span></div>' +
        '<div class="result-row"><span class="result-label">📦 Costo de ventas</span><span class="result-value negative">−' + fmt(costos) + '</span></div>' +
        '<div class="result-row total"><span class="result-label">Utilidad bruta</span><span class="result-value">' + fmt(utilidad) + '</span></div>' +
      '</div>' +

      '<div class="result-section">' +
        '<div class="result-section-title">Indicadores clave</div>' +
        '<div class="result-row"><span class="result-label">📊 Margen bruto</span><span class="result-value ' + (margen>=20?'positive':margen>=10?'':'negative') + '">' + margen + '%</span></div>' +
        '<div class="chart-bar-wrap"><div class="chart-bar-bg"><div class="chart-bar-fill ' + (margen>=20?'green':'orange') + '" style="width:' + Math.min(margen,100) + '%"></div></div></div>' +
        '<div class="result-row"><span class="result-label">🧾 N° de ventas</span><span class="result-value">' + list.length + '</span></div>' +
        '<div class="result-row"><span class="result-label">💵 Ticket promedio</span><span class="result-value">' + (list.length ? fmt(Math.round(ingresos/list.length)) : '$0') + '</span></div>' +
        '<div class="result-row"><span class="result-label">🏪 Valor del inventario</span><span class="result-value blue">' + fmt(valorInv) + '</span></div>' +
      '</div>' +

      (topProds.length ? '<div class="result-section">' +
        '<div class="result-section-title">Top productos por ganancia</div>' +
        topProds.map(function(p) {
          var pct = maxGan > 0 ? Math.round(p.ganancia/maxGan*100) : 0;
          return '<div class="result-row" style="flex-direction:column;align-items:flex-start;gap:5px;">' +
            '<div style="display:flex;justify-content:space-between;width:100%;">' +
              '<span class="result-label">' + catEmoji('') + ' ' + p.nombre + '</span>' +
              '<span class="result-value positive">' + fmt(p.ganancia) + '</span>' +
            '</div>' +
            '<div style="width:100%"><div class="chart-bar-bg"><div class="chart-bar-fill green" style="width:' + pct + '%"></div></div></div>' +
            '<span style="font-size:11px;color:var(--text-3);">' + p.qty + ' unidades vendidas · Ingresos: ' + fmt(p.ingresos) + '</span>' +
          '</div>';
        }).join('') +
      '</div>' : '') +

      (list.length === 0 ? '<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">Sin ventas en este período.<br>Registra ventas para ver tus resultados.</div></div>' : '');
  }

  // ── MODAL ──
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  document.querySelectorAll('.modal-overlay').forEach(function(m) {
    m.addEventListener('click', function(e) { if (e.target === m) m.classList.remove('open'); });
  });

  // ── INIT ──
  function init() {
    loadData();
    renderInv();
    var now = new Date();
    document.getElementById('topbar-date').textContent =
      now.getDate() + '/' + (now.getMonth()+1) + '/' + now.getFullYear();
  }

  init();
</script>
</body>
</html>
